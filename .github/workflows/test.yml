name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false  # stdlib-only project, nothing to cache

      # ubuntu-latest ships PS 7.4 (LTS), but verify.ps1 needs
      # ConvertFrom-Json -DateKind String, which was added in PS 7.5.
      # Without it, ISO timestamps without fractional seconds parse as
      # [DateTime] and the canonical-JSON walker recurses on DateTime's
      # self-referencing properties (Date, TimeOfDay, ...) until OOM.
      # Install latest stable from Microsoft's apt repo before tests.
      # If this step fails, TestVerifyPs1ParityWithVerifySh would silently
      # skip and a verify.ps1 regression would ride into a release —
      # exactly the class of bug the case-fold sort issue (2026-04-26)
      # and the date-parse infinite walk (2026-04-27) both belonged to.
      - name: Install PowerShell 7.5+
        run: |
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo apt-get install -y powershell
          pwsh --version

      - name: gofmt
        run: |
          out=$(gofmt -d .)
          if [ -n "$out" ]; then
            echo "gofmt diff (run 'gofmt -w .' locally):"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # -v so the "--- PASS: TestVerifyPs1ParityWithVerifySh" line shows
      # up in the workflow log. v0.3.0 release checklist item #9 looks
      # for that exact line — if you see "--- SKIP" instead, pwsh fell
      # off the runner and parity isn't being enforced.
      - name: go test
        run: go test -v ./...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Smoke test: just verify the Dockerfile parses and builds. No
      # push, no registry auth, no image tag worth caring about.
      # Catches Dockerfile bitrot (unpinned base image disappearing,
      # build-arg changes, etc.) before a release tag tries to use it.
      - name: docker build
        run: docker build -t statedrift:ci .
